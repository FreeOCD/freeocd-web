name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Build DAP.js
        working-directory: vendor/dapjs
        run: |
          npm install
          npm run build

      - name: Copy build artifacts
        run: |
          mkdir -p public/lib
          cp vendor/dapjs/dist/dap.umd.js public/lib/dap.umd.js
          cp vendor/dapjs/LICENSE public/lib/dapjs-LICENSE.txt

      - name: Install ESLint
        run: npm install --no-save eslint@8

      - name: Lint
        run: npx eslint public/js/**/*.js --no-eslintrc --env browser,es2022 --parser-options=ecmaVersion:2022,sourceType:module --rule '{"no-unused-vars":"warn","no-undef":"warn"}'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeocd-web-public
          path: public/
